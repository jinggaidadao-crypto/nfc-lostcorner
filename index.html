<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOST CORNER - Brutalist Player</title>
    <style>
        /* ================= 基础视觉与变量 (粗野主义/废土风) ================= */
        :root {
            --bg-color: #e5e3db;
            --card-bg: #f2f0e9;
            
            /* LOST CORNER 标志性色彩 */
            --accent-yellow: #f0a500;
            --accent-red: #ea2b1f;    
            --accent-blue: #0a4f66;   
            
            --text-main: #111111;
            --text-sub: #555555;
            
            --border-thick: 3px solid var(--text-main);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            /* 增加类似纸张的噪点纹理感背景 */
            background-image: 
                radial-gradient(#d1cfc7 1px, transparent 1px),
                radial-gradient(#d1cfc7 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            color: var(--text-main);
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; padding: 20px;
        }

        /* 粗野主义风格的卡片容器 */
        .player-container {
            width: 100%; max-width: 414px; background: var(--card-bg);
            padding: 24px; 
            border: var(--border-thick);
            /* 标志性的纯色偏移阴影 */
            box-shadow: 10px 10px 0px var(--text-main);
            position: relative;
        }

        /* ================= 封面与歌词区域 ================= */
        .visual-area {
            position: relative; width: 100%; aspect-ratio: 1 / 1;
            margin-bottom: 24px; 
            border: var(--border-thick);
            box-shadow: 6px 6px 0px var(--accent-yellow); /* 封面黄色强调影 */
            background: #000;
            overflow: hidden;
        }

        .album-cover {
            width: 100%; height: 100%;
            object-fit: cover; 
            /* 暂停时降低饱和度，播放时恢复 */
            filter: grayscale(40%) contrast(1.1);
            transition: filter 0.4s ease, transform 0.4s ease;
        }

        /* 播放状态下的封面视觉反馈 */
        .is-playing .album-cover {
            filter: grayscale(0%) contrast(1.1) saturate(1.2);
            transform: scale(1.02); /* 微微放大带来视觉冲击 */
        }

        .lyrics-panel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(242, 240, 233, 0.98); 
            overflow-y: auto; padding: 20px 16px 150px; text-align: left; /* 歌词改为左对齐，更像海报排版 */
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
            display: flex; flex-direction: column; scroll-behavior: smooth;
            overscroll-behavior: contain; /* 核心修复：防止滚动穿透到 body */
        }
        .lyrics-panel::-webkit-scrollbar { display: none; }
        .lyrics-panel { -ms-overflow-style: none; scrollbar-width: none; }

        .show-lyrics .lyrics-panel { opacity: 1; pointer-events: auto; }
        .show-lyrics .album-cover { opacity: 0; }

        .lyric-line {
            font-size: 0.95rem; color: var(--text-sub); margin-bottom: 16px;
            transition: all 0.2s ease; line-height: 1.5; cursor: pointer;
            border-left: 0px solid transparent;
        }

        .lyric-line.active {
            color: var(--text-main);
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 1.2rem; font-weight: bold;
            /* 粗野主义歌词高亮：左侧红色粗线切割 */
            border-left: 6px solid var(--accent-red);
            padding-left: 12px;
            transform: translateX(4px);
        }

        .lyrics-status { color: var(--text-main); font-weight: bold; font-size: 0.9rem; margin: auto; text-align: center; width: 100%; }

        /* ================= 歌曲信息 ================= */
        .song-details { 
            text-align: left; margin-bottom: 24px; 
            border-bottom: 2px solid var(--text-main);
            padding-bottom: 12px;
        }
        .song-title { 
            font-family: 'Georgia', 'Times New Roman', serif; 
            font-size: 1.6rem; font-weight: 900; margin-bottom: 4px; 
            text-transform: uppercase; letter-spacing: 1px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .artist-name { 
            font-size: 1rem; color: var(--accent-blue); font-weight: 700; text-transform: uppercase; 
        }

        /* ================= 进度条 ================= */
        .progress-container { margin-bottom: 24px; }
        
        .progress-slider {
            -webkit-appearance: none;
            width: 100%; height: 28px; background: transparent; outline: none; cursor: pointer; margin: 0;
        }

        .progress-slider::-webkit-slider-runnable-track {
            width: 100%; height: 8px; 
            border: 2px solid var(--text-main); /* 轨道加上硬朗的边框 */
            background: linear-gradient(to right, var(--accent-red) 0%, var(--accent-red) var(--progress, 0%), transparent var(--progress, 0%), transparent 100%);
        }

        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 20px; /* 刀片状的拖动点 */
            background: var(--text-main);
            border: 2px solid var(--text-main);
            margin-top: -8px; 
            transition: transform 0.1s;
        }

        .progress-slider::-webkit-slider-thumb:active {
            transform: scaleY(1.3); /* 拖动时上下拉长 */
            background: var(--accent-yellow);
        }

        .time-info {
            display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: bold;
            color: var(--text-main); margin-top: 6px;
        }

        /* ================= 控制栏 ================= */
        .controls-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; padding-bottom: 0;
        }
        .side-controls { display: flex; gap: 14px; align-items: center; width: 80px; }
        .side-controls.right { justify-content: flex-end; position: relative; } /* 开启相对定位服务于弹窗 */
        .main-controls { display: flex; align-items: center; gap: 16px; }

        .btn {
            background: none; border: none; cursor: pointer; color: var(--text-main);
            fill: currentColor; display: flex; align-items: center; justify-content: center;
            transition: all 0.1s;
        }
        
        .btn svg { width: 100%; height: 100%; }

        .btn-side { width: 28px; height: 28px; }
        .btn-side.active { color: var(--accent-red); } 
        
        .btn-prev, .btn-next { width: 32px; height: 32px; }
        .btn-prev:active, .btn-next:active { transform: translateX(2px); }

        /* 机械感方形播放键 */
        .btn-play {
            width: 56px; height: 56px; 
            background: var(--accent-yellow); 
            border: 3px solid var(--text-main);
            box-shadow: 4px 4px 0px var(--text-main);
        }
        .btn-play:active {
            transform: translate(4px, 4px); /* 按下时产生真实的机械按压位移 */
            box-shadow: 0px 0px 0px var(--text-main);
        }

        /* ================= 悬浮流媒体菜单新方案 ================= */
        .platform-popup {
            position: absolute;
            bottom: 38px; right: 0;
            background: var(--card-bg);
            border: var(--border-thick);
            box-shadow: 4px 4px 0px var(--text-main);
            display: none; flex-direction: column;
            padding: 4px; z-index: 100; min-width: 130px;
        }
        .platform-popup.show { display: flex; }

        .platform-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 10px; text-decoration: none;
            color: var(--text-main); font-size: 0.8rem; font-weight: bold;
            border: 2px solid transparent; white-space: nowrap;
            transition: all 0.1s;
        }
        .platform-item:hover {
            border: 2px solid var(--text-main);
            background: rgba(0, 0, 0, 0.05);
        }
        .platform-item img { width: 18px; height: 18px; object-fit: contain; }

        /* ================= 歌单列表 ================= */
        .playlist-header {
            font-size: 0.9rem; color: var(--text-main); font-weight: bold; margin-bottom: 12px;
            display: flex; justify-content: space-between; text-transform: uppercase;
        }
        .track-list { 
            list-style: none; max-height: 200px; overflow-y: auto; padding-right: 4px; 
            border-top: 2px solid var(--text-main); padding-top: 8px;
            overscroll-behavior: contain; /* 核心修复：防止列表滚动穿透到 body */
        }
        .track-list::-webkit-scrollbar { width: 6px; }
        .track-list::-webkit-scrollbar-thumb { background: var(--text-main); }
        
        .track-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 10px; cursor: pointer; margin-bottom: 6px;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        /* 列表选中状态使用硬朗边框 */
        .track-item.active { 
            border: 2px solid var(--text-main);
            background: var(--accent-blue);
            color: #fff;
            box-shadow: 3px 3px 0px var(--text-main);
        }
        .track-item.active .track-time { color: rgba(255,255,255,0.8); }
        
        .track-name { font-size: 0.9rem; font-weight: bold; }
        .track-time { font-size: 0.85rem; font-weight: bold; color: var(--text-sub); }

        .toast {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            background: var(--accent-red); border: 2px solid var(--text-main);
            color: white; padding: 8px 16px; font-weight: bold;
            box-shadow: 4px 4px 0 var(--text-main); font-size: 0.85rem; 
            opacity: 0; pointer-events: none; transition: opacity 0.2s, top 0.2s; z-index: 10;
        }
        .toast.show { opacity: 1; top: 20px; }

        @media (hover: hover) {
            .btn-side:hover { transform: scale(1.1); }
            .track-item:hover:not(.active) { border: 2px dashed var(--text-sub); }
        }
    </style>
</head>
<body>

<div class="player-container" id="playerApp">
    <div class="toast" id="toastBox">PROMPT MSG</div>

    <div class="visual-area">
        <img src="cover.jpg" alt="Album Cover" class="album-cover" id="albumCover">
        <div class="lyrics-panel" id="lyricsPanel">
            <div class="lyrics-status" id="lyricsStatus">INIT SYSTEM...</div>
            <div id="lyricsContent"></div>
        </div>
    </div>

    <div class="song-details">
        <div class="song-title" id="currentTitle">Loading...</div>
        <div class="artist-name" id="currentArtist">Loading...</div>
    </div>

    <div class="progress-container">
        <input type="range" class="progress-slider" id="progressSlider" min="0" max="100" value="0">
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
        </div>
    </div>

    <div class="controls-bar">
        <div class="side-controls">
            <button class="btn btn-side" id="btnLoop" title="循环模式">
                <svg viewBox="0 0 24 24" id="loopIcon"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </button>
            <button class="btn btn-side" id="btnLyrics" title="查看歌词">
                <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            </button>
        </div>

        <div class="main-controls">
            <button class="btn btn-prev" id="btnPrev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button class="btn btn-play" id="btnPlay"><svg viewBox="0 0 24 24" id="playIcon" style="width:28px;height:28px;"><path d="M8 5v14l11-7z"/></svg></button>
            <button class="btn btn-next" id="btnNext"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"/></svg></button>
        </div>

        <div class="side-controls right">
            <button class="btn btn-side" id="btnPlatform" title="流媒体跳转">
                <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
            </button>
            <div class="platform-popup" id="platformPopup">
                <a href="#" class="platform-item" id="linkApple" target="_blank"><img src="icon-apple.svg" alt=""><span>Apple Music</span></a>
                <a href="#" class="platform-item" id="linkQQ" target="_blank"><img src="icon-qqmusic.svg" alt=""><span>QQ 音乐</span></a>
                <a href="#" class="platform-item" id="linkNetease" target="_blank"><img src="icon-neteasemusic.svg" alt=""><span>网易云音乐</span></a>
                <a href="#" class="platform-item" id="linkSpotify" target="_blank"><img src="icon-spotify.svg" alt=""><span>Spotify</span></a>
                <a href="#" class="platform-item" id="linkBilibili" target="_blank"><img src="icon-bilibili.svg" alt=""><span>Bilibili</span></a>
            </div>
        </div>
    </div>

    <div class="playlist-header"><span>Tracklist</span><span>Play →</span></div>
    <ul class="track-list" id="trackList"></ul>
</div>

<audio id="mainAudio" src="" preload="metadata"></audio>

<script>
    // [安全] XSS 过滤器
    function escapeHTML(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, function(match) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[match];
        });
    }

    // [安全] URL 协议黑名单过滤器
    function isSafeUrl(url) {
        const invalidProtocols = /^(javascript|vbscript|data):/i;
        return !invalidProtocols.test(url.trim());
    }

    // [网络优化] 带有超时控制的 fetch
    const fetchWithTimeout = async (resource, options = {}) => {
        const { timeout = 5000 } = options;
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        try {
            const response = await fetch(resource, { ...options, signal: controller.signal });
            clearTimeout(id);
            return response;
        } catch (error) {
            clearTimeout(id);
            throw error;
        }
    };

    let playlist = []; 
    let currentTrackIndex = 0;
    let isPlaying = false;
    let loopMode = 0; 
    let isDragging = false; 
    let parsedLyrics = [];
    
    let isUserScrolling = false;
    let userScrollTimeout;
    let currentLyricsRequestId = 0;
    let lastActiveLyricIndex = -1; 
    let activePlatformsCount = 0; // 记录当前曲目可用平台数

    const audio = document.getElementById('mainAudio');
    const playerApp = document.getElementById('playerApp');
    const btnLyrics = document.getElementById('btnLyrics');
    const lyricsStatus = document.getElementById('lyricsStatus');
    const lyricsContent = document.getElementById('lyricsContent');
    const lyricsPanel = document.getElementById('lyricsPanel');
    const progressSlider = document.getElementById('progressSlider');
    const currentTimeText = document.getElementById('currentTime');
    const totalTimeText = document.getElementById('totalTime');
    const trackListContainer = document.getElementById('trackList');

    const loopIconsSVG = [
        '<path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>',
        '<path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/><text x="12" y="15.5" font-size="7" font-weight="bold" text-anchor="middle" fill="currentColor">1</text>',
        '<path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>'
    ];

    async function loadPlaylistConfig() {
        try {
            const response = await fetchWithTimeout('playlist.json', { timeout: 6000 });
            if (!response.ok) throw new Error('Network error');
            playlist = await response.json();
            if (!playlist || playlist.length === 0) {
                lyricsStatus.textContent = 'EMPTY PLAYLIST';
                return;
            }
            initPlaylist();
            loadTrack(0);
        } catch (error) {
            showToast("Failed to load playlist.json");
            lyricsStatus.textContent = 'DATA LOAD ERROR';
        }
    }

    const handleUserScroll = () => {
        isUserScrolling = true;
        clearTimeout(userScrollTimeout);
        userScrollTimeout = setTimeout(() => isUserScrolling = false, 3000);
    };
    lyricsPanel.addEventListener('touchstart', handleUserScroll, {passive: true});
    lyricsPanel.addEventListener('wheel', handleUserScroll, {passive: true});
    lyricsPanel.addEventListener('mousedown', handleUserScroll);

    function initPlaylist() {
        trackListContainer.innerHTML = '';
        playlist.forEach((track, index) => {
            const li = document.createElement('li');
            li.className = `track-item ${index === currentTrackIndex ? 'active' : ''}`;
            const displayDuration = track.duration || "--:--";
            
            li.innerHTML = `
                <span class="track-name">${index + 1}. ${escapeHTML(track.title)}</span>
                <span class="track-time" id="list-time-${index}">${escapeHTML(displayDuration)}</span>
            `;
            li.addEventListener('click', () => switchTrack(index));
            trackListContainer.appendChild(li);
        });
    }

    function loadTrack(index) {
        isUserScrolling = false;
        clearTimeout(userScrollTimeout);
        lastActiveLyricIndex = -1; 

        currentTrackIndex = index;
        const track = playlist[index];
        audio.src = track.src;
        document.getElementById('currentTitle').textContent = track.title;
        document.getElementById('currentArtist').textContent = track.artist;
        document.title = `${track.title} - ${track.artist}`;
        
        let tempMax = 300;
        if (track.duration && track.duration.includes(':')) {
            const timeParts = track.duration.split(':');
            tempMax = parseInt(timeParts[0]) * 60 + parseInt(timeParts[1]);
        }
        progressSlider.max = tempMax; 
        
        totalTimeText.textContent = track.duration || "--:--"; 
        progressSlider.value = 0;
        progressSlider.style.setProperty('--progress', '0%');
        currentTimeText.textContent = '0:00';

        // 解析并控制跳转菜单的渲染
        activePlatformsCount = 0;
        setupPlatform('linkApple', track.apple);
        setupPlatform('linkQQ', track.qq);
        setupPlatform('linkNetease', track.netease);
        setupPlatform('linkSpotify', track.spotify);
        setupPlatform('linkBilibili', track.bilibili);

        // 如果整首歌没有任何外链，自动隐藏跳转按钮本身
        const btnPlat = document.getElementById('btnPlatform');
        const popPlat = document.getElementById('platformPopup');
        btnPlat.style.display = activePlatformsCount > 0 ? 'flex' : 'none';
        btnPlat.classList.remove('active');
        popPlat.classList.remove('show');

        const items = trackListContainer.querySelectorAll('.track-item');
        items.forEach((item, idx) => item.classList.toggle('active', idx === index));

        fetchLyrics(track);
    }

    function setupPlatform(id, url) {
        const el = document.getElementById(id);
        if (url && url.trim() !== "" && isSafeUrl(url)) { 
            el.href = url; 
            el.style.display = 'flex';
            activePlatformsCount++;
        } else { 
            el.href = "#"; 
            el.style.display = 'none';
        }
    }

    function switchTrack(index) {
        if (playlist.length === 0) return;
        if (index < 0) index = playlist.length - 1;
        if (index >= playlist.length) index = 0;
        loadTrack(index);
        audio.play().catch(() => {});
    }

    async function fetchLyrics(track) {
        lyricsStatus.style.display = 'block';
        lyricsStatus.textContent = 'SEARCHING LYRICS...';
        lyricsContent.innerHTML = '';
        parsedLyrics = [];
        const requestId = ++currentLyricsRequestId;
    
        try {
            // 构建基础的目标歌词 API 网址
            const targetUrl = `https://lrclib.net/api/get?track_name=${encodeURIComponent(track.title)}&artist_name=${encodeURIComponent(track.artist)}`;
            let response;
            
            try {
                // 🌟 第一步：尝试直接连接歌词库（4秒超时）
                response = await fetchWithTimeout(targetUrl, { timeout: 4000 });
                if (!response.ok) throw new Error('Direct fetch failed');
            } catch (directError) {
                console.log("直连歌词库受阻，正在启动备用 CORS 代理服务器救场...");
                // 🌟 第二步：备用救场方案。通过 corsproxy.io 免费公共代理中转请求（5秒超时）
                const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
                response = await fetchWithTimeout(proxyUrl, { timeout: 5000 });
                if (!response.ok) throw new Error('Proxy fetch failed');
            }
            
            if (requestId !== currentLyricsRequestId) return;
            const data = await response.json();
            
            if (data.syncedLyrics) {
                lyricsStatus.style.display = 'none';
                parsedLyrics = parseLRC(data.syncedLyrics);
                renderLyrics();
            } else if (data.plainLyrics) {
                lyricsStatus.style.display = 'none';
                const safePlainLyrics = escapeHTML(data.plainLyrics).replace(/\n/g, '<br><br>');
                // 完美保留原有 index.html 的硬核粗野主义视觉排版与文案
                lyricsContent.innerHTML = `
                    <div style="font-size:0.8rem; color:var(--accent-red); margin-bottom:24px; font-weight:bold;">[NO SYNC TIMESTAMPS]</div>
                    <div class="lyric-line" style="color:var(--text-main); cursor:default; pointer-events:none; border:none;">${safePlainLyrics}</div>
                `;
            } else {
                lyricsStatus.textContent = '[INSTRUMENTAL / NO LYRICS]';
            }
        } catch (error) {
            if (requestId === currentLyricsRequestId) {
                lyricsStatus.textContent = '[FETCH FAILED]';
            }
        }
    }

    function parseLRC(lrc) {
        const lines = [];
        const regex = /\[(\d{2}):(\d{2}(?:\.\d{2,3})?)\](.*)/g;
        let match;
        while ((match = regex.exec(lrc)) !== null) {
            const minutes = parseInt(match[1]);
            const seconds = parseFloat(match[2]);
            const text = match[3].trim();
            if (text) lines.push({ time: minutes * 60 + seconds, text: text });
        }
        return lines;
    }

    function renderLyrics() {
        lyricsContent.innerHTML = '';
        parsedLyrics.forEach((line, index) => {
            const p = document.createElement('div');
            p.className = 'lyric-line';
            p.id = `lyric-${index}`;
            p.textContent = line.text;
            p.addEventListener('click', () => {
                audio.currentTime = line.time;
                if (!isPlaying) audio.play();
                isUserScrolling = false; 
            });
            lyricsContent.appendChild(p);
        });

        if (playerApp.classList.contains('show-lyrics')) {
            syncLyrics(audio.currentTime);
        }
    }

    function syncLyrics(currentTime) {
        if (parsedLyrics.length === 0) return;

        let activeIndex = 0;
        for (let i = 0; i < parsedLyrics.length; i++) {
            if (currentTime >= parsedLyrics[i].time) activeIndex = i;
            else break;
        }

        if (activeIndex !== lastActiveLyricIndex) {
            const lines = lyricsContent.getElementsByClassName('lyric-line');
            for (let i = 0; i < lines.length; i++) {
                if (i === activeIndex) {
                    if (!lines[i].classList.contains('active')) {
                        lines[i].classList.add('active');
                        if (!isUserScrolling) {
                            // 计算当前歌词行在面板中的居中位置
                            const targetTop = lines[i].offsetTop - (lyricsPanel.clientHeight / 2) + (lines[i].clientHeight / 2);
                            lyricsPanel.scrollTo({
                                top: targetTop,
                                behavior: 'smooth' // 平滑滚动
                            });
                        }
                    }
                } else {
                    lines[i].classList.remove('active');
                }
            }
            lastActiveLyricIndex = activeIndex;
        }
    }

    btnLyrics.addEventListener('click', () => {
        playerApp.classList.toggle('show-lyrics');
        btnLyrics.classList.toggle('active');
        if (playerApp.classList.contains('show-lyrics')) {
            setTimeout(() => {
                const activeLine = lyricsContent.querySelector('.lyric-line.active');
                if (activeLine) {
                    // 切换面板时，同样用 scrollTo 精确计算位置，防止页面跳动
                    const targetTop = activeLine.offsetTop - (lyricsPanel.clientHeight / 2) + (activeLine.clientHeight / 2);
                    lyricsPanel.scrollTo({
                        top: targetTop,
                        behavior: 'auto' // 首次打开直接定位，不需要动画
                    });
                }
            }, 100); 
        }
    });

    audio.addEventListener('loadedmetadata', () => {
        progressSlider.max = audio.duration; 
        totalTimeText.textContent = formatTime(audio.duration);
    });
    audio.addEventListener('timeupdate', () => {
        if (audio.duration && !isDragging) {
            progressSlider.value = audio.currentTime;
            currentTimeText.textContent = formatTime(audio.currentTime);
            const percent = (audio.currentTime / audio.duration) * 100;
            progressSlider.style.setProperty('--progress', `${percent}%`);
            syncLyrics(audio.currentTime);
        }
    });

    audio.addEventListener('waiting', () => {
        currentTimeText.textContent = "BUFF...";
    });
    audio.addEventListener('playing', () => {
        currentTimeText.textContent = formatTime(audio.currentTime);
    });

    progressSlider.addEventListener('input', () => {
        isDragging = true;
        currentTimeText.textContent = formatTime(progressSlider.value);
        const percent = (progressSlider.value / audio.duration) * 100;
        progressSlider.style.setProperty('--progress', `${percent}%`);
        syncLyrics(parseFloat(progressSlider.value));
    });
    
    progressSlider.addEventListener('change', () => {
        audio.currentTime = progressSlider.value;
        isDragging = false;
    });

    document.getElementById('btnPlay').addEventListener('click', () => {
        if (playlist.length === 0) return;
        if (isPlaying) audio.pause(); else audio.play().catch(() => showToast("MANUAL PLAY REQ"));
    });

    document.getElementById('btnPrev').addEventListener('click', () => switchTrack(currentTrackIndex - 1));
    document.getElementById('btnNext').addEventListener('click', () => switchTrack(currentTrackIndex + 1));

    document.getElementById('btnLoop').addEventListener('click', () => {
        loopMode = (loopMode + 1) % 3;
        document.getElementById('loopIcon').innerHTML = loopIconsSVG[loopMode];
        showToast(["LOOP: ALL", "LOOP: ONE", "SHUFFLE"][loopMode]);
    });

    // 控制外部跳转菜单点击显示逻辑
    document.getElementById('btnPlatform').addEventListener('click', (e) => {
        e.stopPropagation(); // 阻止事件冒泡防止被 document 误关
        const popup = document.getElementById('platformPopup');
        const btn = document.getElementById('btnPlatform');
        const isShow = popup.classList.toggle('show');
        btn.classList.toggle('active', isShow);
    });

    // 点击页面其他任意地方自动闭合流媒体菜单
    document.addEventListener('click', (e) => {
        const popup = document.getElementById('platformPopup');
        const btn = document.getElementById('btnPlatform');
        if (!popup.contains(e.target) && !btn.contains(e.target)) {
            popup.classList.remove('show');
            btn.classList.remove('active');
        }
    });

    audio.addEventListener('ended', () => {
        if (loopMode === 1) { 
            audio.currentTime = 0; 
            audio.play(); 
        } else if (loopMode === 2) {
            let nextIdx;
            do {
                nextIdx = Math.floor(Math.random() * playlist.length);
            } while (nextIdx === currentTrackIndex && playlist.length > 1);
            switchTrack(nextIdx);
        } else {
            switchTrack(currentTrackIndex + 1);
        }
    });

    audio.addEventListener('play', () => {
        isPlaying = true;
        playerApp.classList.add('is-playing'); 
        document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    });

    audio.addEventListener('pause', () => {
        isPlaying = false;
        playerApp.classList.remove('is-playing');
        document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
    });

    audio.addEventListener('error', () => {
        if (!isPlaying) return;
        if (audio.error && audio.error.code === 1) return;

        showToast("AUDIO LOAD ERROR");
        isPlaying = false;
        playerApp.classList.remove('is-playing');
        document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
    });

    function formatTime(seconds) {
        if (isNaN(seconds) || seconds === Infinity) return "0:00";
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    let toastTimer;
    function showToast(msg) {
        const tb = document.getElementById('toastBox');
        tb.textContent = msg; tb.classList.add('show');
        clearTimeout(toastTimer); toastTimer = setTimeout(() => tb.classList.remove('show'), 2000);
    }

    loadPlaylistConfig();
</script>
</body>
</html>
